<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>CorvexDev — Admin</title>

  <!-- Hoja principal reusada (variables, reset, dark mode) -->
  <link rel="stylesheet" href="style.css" />

  <!-- Overrides mínimos para el layout del admin. Inline a propósito para
       no tocar style.css y mantener el archivo del sitio público intacto. -->
  <style>
    .admin-shell   { max-width: 880px; margin: 0 auto; padding: 120px var(--space-3) var(--space-5); }
    .admin-card    { background: linear-gradient(180deg, var(--color-surface) 0%, var(--color-bg-2) 100%);
                     border: 1px solid var(--color-border); border-radius: var(--radius-lg);
                     padding: var(--space-4); margin-bottom: var(--space-3); }
    .admin-list    { display: flex; flex-direction: column; gap: var(--space-2); }
    .admin-item    { display: flex; gap: var(--space-3); align-items: center;
                     padding: var(--space-2); border: 1px solid var(--color-border);
                     border-radius: var(--radius-sm); background: var(--color-bg); }
    .admin-item__thumb { width: 80px; height: 50px; object-fit: cover; border-radius: 6px;
                         background: var(--color-surface-2); flex-shrink: 0; }
    .admin-item__body  { flex: 1; min-width: 0; }
    .admin-item__title { font-weight: 600; word-break: break-word; }
    .admin-item__meta  { font-size: 0.8rem; color: var(--color-text-muted); }
    .admin-item__actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn--danger    { background: #dc2626; color: #fff; }
    .btn--danger:hover { background: #b91c1c; color: #fff; }
    .btn--secondary { background: var(--color-surface-2); color: var(--color-text);
                      border: 1px solid var(--color-border); }
    .btn--secondary:hover { background: var(--color-surface); color: var(--color-text); }

    .admin-form-row { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: var(--space-2); }
    .admin-form-row label { font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); }
    .admin-form-row input,
    .admin-form-row textarea {
      width: 100%; padding: 0.7rem 0.9rem; background: var(--color-bg);
      border: 1px solid var(--color-border); border-radius: var(--radius-sm);
      color: var(--color-text); font-family: inherit; font-size: 0.95rem;
    }
    .admin-form-row input:focus-visible,
    .admin-form-row textarea:focus-visible {
      outline: none; border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, .15);
    }
    .admin-form-row textarea { min-height: 100px; resize: vertical; }
    .admin-form-actions { display: flex; gap: 0.5rem; margin-top: var(--space-2); flex-wrap: wrap; }

    .admin-status { padding: 0.6rem 0.8rem; border-radius: var(--radius-sm);
                    font-size: 0.9rem; margin-bottom: var(--space-2); display: none; }
    .admin-status.is-error { display: block; background: rgba(239, 68, 68, .1);
                              border: 1px solid rgba(239, 68, 68, .35); color: #fca5a5; }
    .admin-status.is-ok    { display: block; background: rgba(16, 185, 129, .1);
                              border: 1px solid rgba(16, 185, 129, .35); color: #6ee7b7; }

    .admin-logged-out { max-width: 420px; margin: 120px auto; }

    .admin-header { display: flex; justify-content: space-between; align-items: center;
                    margin-bottom: var(--space-4); flex-wrap: wrap; gap: var(--space-2); }
    .admin-header h1 { margin: 0; }

    @media (max-width: 480px) {
      .admin-item { flex-wrap: wrap; }
      .admin-item__actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <main class="admin-shell">

    <!-- ============ Vista: no autenticado ============ -->
    <div id="loginView" class="admin-logged-out" hidden>
      <div class="admin-card">
        <h1 class="section__title" style="margin-bottom: var(--space-2);">Acceso admin</h1>
        <p style="color: var(--color-text-muted); margin-bottom: var(--space-3);">
          Iniciá sesión para administrar los proyectos.
        </p>
        <div class="admin-status" id="loginStatus" role="alert"></div>
        <form id="loginForm" novalidate>
          <div class="admin-form-row">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" name="email" autocomplete="email" required />
          </div>
          <div class="admin-form-row">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" name="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn--primary btn--block">Iniciar sesión</button>
        </form>
      </div>
    </div>

    <!-- ============ Vista: autenticado ============ -->
    <div id="adminView" hidden>
      <header class="admin-header">
        <h1 class="section__title">Proyectos</h1>
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
          <button id="newProjectBtn" class="btn btn--primary" type="button">+ Nuevo proyecto</button>
          <button id="logoutBtn" class="btn btn--ghost" type="button">Cerrar sesión</button>
        </div>
      </header>

      <div class="admin-status" id="adminStatus" role="status" aria-live="polite"></div>

      <!-- Form de alta / edición -->
      <div class="admin-card" id="projectFormCard" hidden>
        <h2 id="formTitle" style="margin-bottom: var(--space-2);">Nuevo proyecto</h2>
        <form id="projectForm" novalidate>
          <input type="hidden" id="projectId" />

          <div class="admin-form-row">
            <label for="fTitle">Título</label>
            <input type="text" id="fTitle" maxlength="120" required />
          </div>

          <div class="admin-form-row">
            <label for="fDescription">Descripción</label>
            <textarea id="fDescription" maxlength="1000" required></textarea>
          </div>

          <div class="admin-form-row">
            <label for="fLink">Link (https://...)</label>
            <input type="url" id="fLink" required placeholder="https://..." />
          </div>

          <div class="admin-form-row">
            <label for="fTags">Tags (separados por coma)</label>
            <input type="text" id="fTags" placeholder="HTML, CSS, JavaScript" />
          </div>

          <div class="admin-form-row">
            <label for="fOrder">Orden (menor = primero)</label>
            <input type="number" id="fOrder" value="0" />
          </div>

          <div class="admin-form-row">
            <label for="fImage">Imagen (PNG / JPG / WebP, máx 2 MB)</label>
            <input type="file" id="fImage" accept="image/png,image/jpeg,image/webp" />
            <img id="fImagePreview" alt="" style="max-width: 200px; margin-top: 0.5rem; border-radius: 8px; display: none;" />
            <p id="fImageCurrent" style="font-size: 0.8rem; color: var(--color-text-muted); margin-top: 0.4rem; display: none;"></p>
          </div>

          <div class="admin-form-row">
            <label style="display: flex; gap: 0.5rem; align-items: center; cursor: pointer;">
              <input type="checkbox" id="fPublished" checked />
              <span>Publicado</span>
            </label>
          </div>

          <div class="admin-form-actions">
            <button type="submit" class="btn btn--primary" id="saveBtn">Guardar</button>
            <button type="button" class="btn btn--secondary" id="cancelFormBtn">Cancelar</button>
          </div>
        </form>
      </div>

      <!-- Listado -->
      <div class="admin-card">
        <div class="admin-list" id="adminList" aria-live="polite"></div>
        <p id="adminEmpty" style="text-align: center; color: var(--color-text-muted);" hidden>
          No hay proyectos todavía. Cargá el primero con "+ Nuevo proyecto".
        </p>
      </div>
    </div>

  </main>

  <!-- SDK + cliente + admin. Orden: SDK → config → cliente → consumer. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="admin.js"></script>
</body>
</html>
